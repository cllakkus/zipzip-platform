<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>ZIPZIP — Platform Oyunu</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  :root { --ink:#eef3fb; --muted:#9aa6bd; --accent:#ffcf4d; --game:'Fredoka', system-ui, sans-serif; --pix:'Press Start 2P', monospace; }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; background:#0b0f1c; color:var(--ink); overflow:hidden; font-family: var(--game);
    -webkit-user-select:none; user-select:none; -webkit-tap-highlight-color:transparent; touch-action:none; }
  .wrap { min-height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; padding:10px; }
  h1 { margin:0; font-size:32px; font-weight:700; letter-spacing:4px; color:#fff; text-shadow:0 3px 0 #c98a1e, 0 6px 16px rgba(0,0,0,.6); }
  h1 b { color:var(--accent); }
  .hint { color:var(--muted); font-size:13px; font-weight:500; }
  .stage { position:relative; width:min(96vw, 900px); }
  canvas { width:100%; height:auto; border:4px solid #232f4d; border-radius:14px; display:block; box-shadow:0 16px 50px rgba(0,0,0,.6); }
  kbd { background:#1a2336; border:1px solid #2a3650; border-bottom-width:2px; border-radius:6px; padding:1px 8px; font-size:12px; color:var(--ink); }
  .hidden { display:none !important; }
  /* --- 2D PIXEL menü/ölüm ekranı --- */
  .overlay { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px; text-align:center;
    background:linear-gradient(180deg, rgba(18,26,50,.95), rgba(8,12,22,.97)); border-radius:12px; padding:16px; }
  .pix-title { font-family:var(--pix); font-size:clamp(20px,5vw,34px); color:#ffd24d; line-height:1.5; margin:0;
    text-shadow:3px 3px 0 #b03a2a, 6px 6px 0 rgba(0,0,0,.55); }
  .death .pix-title { color:#ff6b6b; text-shadow:3px 3px 0 #5a1818, 6px 6px 0 rgba(0,0,0,.55); }
  .pix-sub { font-family:var(--pix); font-size:clamp(8px,2.2vw,11px); color:#9ad0ff; line-height:1.9; max-width:90%; margin:0; }
  .btn.pix { font-family:var(--pix); font-size:clamp(11px,2.6vw,14px); color:#3a2a04; background:#ffc23a; border:none; border-radius:0; padding:16px 22px; cursor:pointer; letter-spacing:1px;
    box-shadow:0 0 0 4px #4a3208, 5px 5px 0 4px rgba(0,0,0,.45), inset -3px -3px 0 #c98a1e, inset 3px 3px 0 #ffe27a; }
  .btn.pix:active { transform:translate(2px,2px); box-shadow:0 0 0 4px #4a3208, 2px 2px 0 4px rgba(0,0,0,.45), inset -3px -3px 0 #c98a1e, inset 3px 3px 0 #ffe27a; }
  .btn.pix.alt { background:#7adb8a; color:#103a18; box-shadow:0 0 0 4px #1f4a2a, 5px 5px 0 4px rgba(0,0,0,.45), inset -3px -3px 0 #3f8f4a, inset 3px 3px 0 #c6f0c8; }
  .btn.pix.alt:active { transform:translate(2px,2px); }
  /* --- dokunmatik kontroller (mobil) --- */
  #touch { display:none; }
  #touch.on { display:block; }
  .tbtn { position:fixed; bottom:max(14px,3.5vh); z-index:31; pointer-events:auto; width:clamp(52px,13vw,64px); height:clamp(52px,13vw,64px);
    font-family:var(--pix); font-size:15px; color:rgba(255,255,255,.92); background:rgba(20,28,52,.32); border:2px solid rgba(255,255,255,.32); border-radius:11px;
    box-shadow:inset 0 -3px 0 rgba(0,0,0,.25); display:flex; align-items:center; justify-content:center; touch-action:none; opacity:.82; transition:transform .06s, background .06s, opacity .12s; }
  .tbtn:active { background:rgba(122,212,255,.6); transform:scale(.9); opacity:1; }
  #t-left { left:max(14px,3vw); } #t-right { left:calc(max(14px,3vw) + clamp(52px,13vw,64px) + 10px); }
  #t-jump { right:max(14px,3vw); width:clamp(64px,16vw,84px); height:clamp(64px,16vw,84px); background:rgba(255,194,58,.38); border-color:rgba(255,220,120,.5); }
  /* dükkan kartları */
  .shop-item { width:118px; background:#141a28; border:3px solid #2a3650; padding:8px; text-align:center; font-family:var(--pix); }
  .shop-item .sw { width:40px; height:40px; margin:2px auto 6px; border:2px solid #00000044; }
  .shop-item .nm { font-size:8px; color:#cdd6e8; line-height:1.6; min-height:22px; }
  .shop-item .pr { font-size:9px; color:#ffd24d; margin:4px 0; }
  .shop-item button { font-family:var(--pix); font-size:8px; padding:7px 6px; border:none; cursor:pointer; width:100%;
    background:#ffc23a; color:#3a2a04; box-shadow:inset -2px -2px 0 #c98a1e; }
  .shop-item button.equipped { background:#7adb8a; color:#103a18; }
  .shop-item button.locked { background:#566; color:#bcd; }
  .row2 { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }
  .btn.pix.sm { font-size:clamp(9px,2.2vw,11px); padding:11px 16px; }
  .pop { animation:pop 2.4s ease-in-out infinite; } @keyframes pop { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
  .glow { animation:glow 1.1s ease-in-out infinite; } @keyframes glow { 0%,100%{filter:brightness(1)} 50%{filter:brightness(1.18)} }
  .coin-line { animation:none; }
  /* dükkan sekmeleri */
  .shoptab { font-family:var(--pix); font-size:9px; padding:9px 14px; border:none; cursor:pointer; background:#2a3650; color:#9aa6bd; }
  .shoptab.on { background:#ffc23a; color:#3a2a04; }
  #shop-list { display:flex; flex-wrap:wrap; gap:10px; justify-content:center; max-width:94%; max-height:46vh; overflow:auto; padding:4px; }
  /* bölüm seçim ızgarası */
  #levels-grid { display:grid; grid-template-columns:repeat(10,1fr); gap:6px; max-width:94%; max-height:54vh; overflow:auto; padding:6px; }
  .lvlcell { font-family:var(--pix); font-size:9px; width:100%; aspect-ratio:1; display:flex; align-items:center; justify-content:center; cursor:pointer;
    background:#2f7fd0; color:#fff; box-shadow:inset -2px -2px 0 #1a5a9a, inset 2px 2px 0 #6ab0ee; transition:.08s; }
  .lvlcell:hover { transform:scale(1.08); }
  .lvlcell.locked { background:#1a2030; color:#3a4458; cursor:not-allowed; box-shadow:inset -2px -2px 0 #0d1320; }
  .lvlcell.boss { background:#b03a4a; box-shadow:inset -2px -2px 0 #7a1828, inset 2px 2px 0 #e06a7a; }
  .lvlcell.locked.boss { background:#3a1a22; color:#5a3038; }
</style>
</head>
<body>
<div class="wrap">
  <h1>ZIP<b>ZIP</b></h1>
  <div class="hint">Hareket <kbd>←</kbd><kbd>→</kbd> · Zıpla <kbd>Boşluk</kbd>/<kbd>↑</kbd> · Yeniden <kbd>R</kbd> · Ses <kbd>M</kbd></div>
  <div class="stage">
    <canvas id="game" width="900" height="520"></canvas>
    <div id="overlay" class="overlay">
      <h2 class="pix-title pop">ZIP<span style="color:#9ad0ff">ZIP</span></h2>
      <p class="pix-sub">GÖLGEHAN KIZI KAÇIRDI! PEŞİNE DÜŞ, KURTAR.</p>
      <p class="pix-sub coin-line" style="color:#ffd24d">🪙 <span id="menu-coins">0</span></p>
      <button id="btn-continue" class="btn pix hidden">DEVAM ET</button>
      <button id="btn-new" class="btn pix alt">YENİ OYUN</button>
      <div class="row2">
        <button id="btn-levels" class="btn pix sm">BÖLÜMLER</button>
        <button id="btn-shop" class="btn pix sm">🪙 DÜKKAN</button>
      </div>
    </div>
    <div id="death" class="overlay death hidden">
      <h2 class="pix-title">YAKALANDIN!</h2>
      <p class="pix-sub">SKOR: <span id="death-score">0</span></p>
      <button id="death-ad" class="btn pix glow" style="background:#7adb8a;color:#103a18;box-shadow:0 0 0 4px #1f4a2a,5px 5px 0 4px rgba(0,0,0,.45),inset -3px -3px 0 #3f8f4a,inset 3px 3px 0 #c6f0c8">📺 REKLAM İZLE & DEVAM</button>
      <p class="pix-sub" style="font-size:8px;color:#9ad0ff">ÖLDÜĞÜN YERDEN +2 SN DOKUNULMAZLIK</p>
      <div class="row2">
        <button id="death-retry" class="btn pix sm alt">BAŞTAN</button>
        <button id="death-menu" class="btn pix sm">ANA MENÜ</button>
      </div>
    </div>
    <div id="ending" class="overlay hidden">
      <h2 class="pix-title pop" style="color:#7adb8a">KURTARDIN!</h2>
      <p class="pix-sub">GÖLGEHAN YENİLDİ, ARKADAŞINI KURTARDIN! 🏆</p>
      <p class="pix-sub" style="color:#ffd24d">SKOR: <span id="end-score">0</span></p>
      <button id="end-menu" class="btn pix alt">ANA MENÜ</button>
    </div>
    <div id="adv" class="overlay hidden">
      <h2 class="pix-title" style="font-size:clamp(14px,3.5vw,22px)">REKLAM</h2>
      <p class="pix-sub" id="adv-text">REKLAM YÜKLENİYOR…</p>
    </div>
    <div id="levels" class="overlay hidden">
      <h2 class="pix-title" style="font-size:clamp(16px,4vw,24px)">BÖLÜMLER</h2>
      <div id="levels-grid"></div>
      <button id="levels-back" class="btn pix alt sm">‹ GERİ</button>
    </div>
    <div id="shop" class="overlay hidden">
      <h2 class="pix-title" style="font-size:clamp(15px,3.6vw,22px)">DÜKKAN · 🪙 <span id="shop-coins">0</span></h2>
      <div class="row2"><button id="tab-cos" class="shoptab on">KOSTÜM</button><button id="tab-up" class="shoptab">GÜÇLER</button></div>
      <div id="shop-list"></div>
      <button id="shop-back" class="btn pix alt sm">‹ GERİ</button>
    </div>
  </div>
</div>
<div id="touch">
  <button class="tbtn" id="t-left">◀</button>
  <button class="tbtn" id="t-right">▶</button>
  <button class="tbtn jump" id="t-jump">▲</button>
</div>

<script>
"use strict";
const canvas=document.getElementById("game"), ctx=canvas.getContext("2d");
const W=canvas.width, H=canvas.height, LEVEL_COUNT=100;

// ================= SES =================
let actx=null, muted=false;
function initAudio(){ if(!actx){ try{ actx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } if(actx&&actx.state==="suspended")actx.resume(); }
function toneAt(freq,dur,type,vol,t){ if(!actx||muted)return; const o=actx.createOscillator(),g=actx.createGain();
  o.type=type||"square"; o.frequency.setValueAtTime(freq,t); g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(vol,t+0.02); g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.connect(g).connect(actx.destination); o.start(t); o.stop(t+dur+0.02); }
function tone(freq,dur,type,vol,slideTo){ if(!actx||muted)return; const t=actx.currentTime,o=actx.createOscillator(),g=actx.createGain();
  o.type=type||"square"; o.frequency.setValueAtTime(freq,t); if(slideTo)o.frequency.exponentialRampToValueAtTime(Math.max(40,slideTo),t+dur);
  g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(vol||0.16,t+0.01); g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.connect(g).connect(actx.destination); o.start(t); o.stop(t+dur+0.02); }
const sfx={ jump:()=>tone(420,0.13,"square",0.14,760), big:()=>tone(520,0.22,"sawtooth",0.15,1150),
  coin:()=>{tone(900,0.06,"square",0.12);setTimeout(()=>tone(1350,0.09,"square",0.12),55);},
  special:()=>{tone(660,0.07);setTimeout(()=>tone(990,0.07),70);setTimeout(()=>tone(1320,0.12),150);},
  stomp:()=>tone(220,0.13,"square",0.18,80), buff:()=>{tone(523,0.1,"triangle",0.16);setTimeout(()=>tone(784,0.12,"triangle",0.16),100);setTimeout(()=>tone(1047,0.18,"triangle",0.16),210);},
  die:()=>{tone(420,0.5,"sawtooth",0.2,55);setTimeout(()=>tone(180,0.4,"sawtooth",0.16,60),120);},
  hurt:()=>tone(160,0.16,"square",0.16,90), laugh:()=>{tone(300,0.1,"sawtooth",0.15,160);setTimeout(()=>tone(260,0.12,"sawtooth",0.15,140),120);setTimeout(()=>tone(220,0.16,"sawtooth",0.15,120),250);} };
const PENT=[0,3,5,7,10,12,15], PROG=[-12,-5,-9,-7];
let mus={timer:null,step:0,next:0,on:true};
function noteHz(s){ return 220*Math.pow(2,s/12); }
function startMusic(){ if(!actx||mus.timer)return; mus.step=0; mus.next=actx.currentTime+0.15;
  mus.timer=setInterval(()=>{ if(!actx)return; const lvl=state?state.levelIdx:0, tn=Math.min(1,lvl/60), spb=0.20-0.07*tn, ahead=0.3;
    while(mus.next<actx.currentTime+ahead){ const s=mus.step;
      if(mus.on&&!muted){ const bar=((s/8)|0)%4, root=PROG[bar];
        toneAt(noteHz(24+root+PENT[(s*2+bar)%PENT.length]+(s%8>=6?12:0)),0.13,"triangle",0.05+0.02*tn,mus.next);
        if(s%2===0) toneAt(noteHz(root),0.32,"sine",0.07,mus.next);
        if(s%8===0) toneAt(noteHz(12+root+PENT[bar%PENT.length]),0.5,"sine",0.03,mus.next);
        if(tn>0.4 && s%2===1) toneAt(6500,0.02,"square",0.01+0.02*tn,mus.next);
        if(tn>0.7 && s%4===0) toneAt(noteHz(root-12),0.12,"sawtooth",0.04,mus.next); }
      mus.step=(mus.step+1)%32; mus.next+=spb; } },45); }
function deathJingle(){ if(!actx)return; const t=actx.currentTime; [0,-2,-4,-7,-12].forEach((n,k)=>toneAt(noteHz(12+n),0.22,"sawtooth",0.12,t+k*0.13)); }

// ================= GİRDİ =================
const keys={}; let jumpQueued=false, jumpHeld=false;
addEventListener("keydown",e=>{ if(["ArrowLeft","ArrowRight","ArrowUp","ArrowDown","Space"].includes(e.code))e.preventDefault();
  keys[e.code]=true; if(e.code==="Space"||e.code==="ArrowUp"){jumpQueued=true;jumpHeld=true;} if(e.code==="KeyR")startGame(); if(e.code==="KeyM")muted=!muted; });
addEventListener("keyup",e=>{ keys[e.code]=false; if(e.code==="Space"||e.code==="ArrowUp")jumpHeld=false; });

// ================= FİZİK =================
const GRAV=2000, MOVE=2200, MAXVX=270, FRICTION=1800, JUMP=660, JUMP_HI=940, COYOTE=0.09, BUFFER=0.10;
const GROUND_Y=440, BUFF_DUR=10;

// ================= BİYOMLAR (8) =================
const BIOMES=[
  { name:"Çayır",        kind:"grass",  sky:["#5bb8f0","#a8dcf5","#d8f0e0"], ground:"#6b4a2b", top:"#4caf50", hill:"#9bd3a4", hill2:"#7bbf86", mtn:"#82c08c", platB:"#8a5a34", platT:"#4caf50", spike:"#cfd8e2", amb:"leaf" },
  { name:"Orman",        kind:"grass",  sky:["#4f8f6a","#7fb78c","#bfe0c0"], ground:"#4f3a26", top:"#3f8f3f", hill:"#3f7a4a", hill2:"#2f5e38", mtn:"#356a40", platB:"#5a4226", platT:"#3f8f3f", spike:"#c8d2c0", amb:"leaf" },
  { name:"Çöl",          kind:"sand",   sky:["#e0b070","#efd09a","#f6e6c0"], ground:"#b58a4a", top:"#d8b070", hill:"#cdb078", hill2:"#a8895c", mtn:"#c4a368", platB:"#b08850", platT:"#d8b070", spike:"#e8d2a0", amb:"dust" },
  { name:"Gecekondu",    kind:"slum",   sky:["#8a8475","#a39c8c","#c2bba8"], ground:"#5a5046", top:"#7a6f5e", hill:"#6a6258", hill2:"#4e4840", mtn:"#5a5448", platB:"#6a5a48", platT:"#8a7a5e", spike:"#b9bcc2", amb:"dust" },
  { name:"Yer Altı",     kind:"cave",   sky:["#161425","#241f3a","#332b50"], ground:"#2a2640", top:"#46406a", hill:"#2e2a48", hill2:"#211e38", mtn:"#2a2546", platB:"#3a3458", platT:"#6a5cc0", spike:"#8a86b0", amb:"glow" },
  { name:"Buz Ülkesi",   kind:"ice",    sky:["#bfe6f5","#d8f0fa","#eef9ff"], ground:"#7fa8c8", top:"#cfeefc", hill:"#a8d0e8", hill2:"#88b8d8", mtn:"#d8eef8", platB:"#9ec4dc", platT:"#dff4ff", spike:"#bfe6f8", amb:"snow" },
  { name:"Ateş Zindanı", kind:"fire",   sky:["#2a0e12","#6a1c18","#b8402a"], ground:"#2a1816", top:"#a83a22", hill:"#3a201c", hill2:"#281612", mtn:"#341a16", platB:"#3a2420", platT:"#c0502a", spike:"#ff7a2a", amb:"ember" },
  { name:"Yanardağ",     kind:"volcano",sky:["#1a0810","#8a201a","#f0902a"], ground:"#3a1c18", top:"#c84a22", hill:"#5a221a", hill2:"#3c1812", mtn:"#4a1e16", platB:"#4a2420", platT:"#e06030", spike:"#ff9a3a", amb:"ember" },
];
function biomeFor(i){ return BIOMES[Math.min(7,Math.floor(i/12.5))]; }
// biyom-sonu boss seviyesi + final
function isBossLevel(i){ return i===LEVEL_COUNT-1 || biomeFor(i)!==biomeFor(i+1); }
// kalıcı coin + kostüm
const COIN_KEY="zipzip_coins", SHOP_KEY="zipzip_shop";
const COSTUMES=[ {id:"classic",name:"Klasik",price:0,shirt:"#c0392b",hat:"#2a3f7a",pants:"#2c3a55"},
  {id:"ocean",name:"Okyanus",price:60,shirt:"#2f7fd0",hat:"#173a6a",pants:"#22305a"},
  {id:"forest",name:"Orman",price:90,shirt:"#3f8f4a",hat:"#234a28",pants:"#2a3a2a"},
  {id:"royal",name:"Mor Asil",price:150,shirt:"#8e44ad",hat:"#4a2068",pants:"#33244a"},
  {id:"gold",name:"Altın Şampiyon",price:300,shirt:"#e0a020",hat:"#a06a10",pants:"#5a4018"} ];
function getCoins(){ return (+localStorage.getItem(COIN_KEY))||0; }
function addCoins(n){ try{ localStorage.setItem(COIN_KEY,getCoins()+n); }catch(e){} }
function getShop(){ try{ const s=JSON.parse(localStorage.getItem(SHOP_KEY)); if(s&&s.owned)return s; }catch(e){} return {owned:["classic"],equip:"classic"}; }
function setShop(s){ try{ localStorage.setItem(SHOP_KEY,JSON.stringify(s)); }catch(e){} }
function equippedCostume(){ const s=getShop(); return COSTUMES.find(c=>c.id===s.equip)||COSTUMES[0]; }
let shake=0, bossOrbs=[];

// ================= DÜŞMANLAR =================
function mulberry32(a){ return function(){ a|=0;a=a+0x6D2B79F5|0; let t=Math.imul(a^a>>>15,1|a); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
function mkEnemy(type,x,minx,maxx,yTop){
  const b={ type,x,minx,maxx,dead:0,phase:Math.random()*6,vy:0,onGround:true };
  if(type==="walker") return {...b,y:yTop??GROUND_Y-32,w:32,h:32,vx:60,hp:1,col:"#46c46a"};   // slime
  if(type==="runner") return {...b,y:yTop??GROUND_Y-28,w:32,h:26,vx:155,hp:1,col:"#e67e22"};   // kertenkele
  if(type==="hopper") return {...b,y:yTop??GROUND_Y-34,w:34,h:34,vx:85,hp:1,col:"#7a9a3a",hopCd:Math.random()*1.5,gy:(yTop!=null?yTop:GROUND_Y-34)}; // kurbağa
  if(type==="tank")   return {...b,y:yTop??GROUND_Y-44,w:46,h:44,vx:50,hp:2,col:"#6a6258"};   // kaya golem
  if(type==="flyer")  return {...b,y:GROUND_Y-150,w:32,h:24,vx:120,hp:1,col:"#5a3a7a",flyY:GROUND_Y-150,onGround:false}; // yarasa
  return {...b,y:yTop??GROUND_Y-58,w:62,h:58,vx:42,hp:3,col:"#5e7a38"}; // dev/ogre
}

// ================= BUFF'LAR =================
const BUFFS={
  hijump:    { col:"#7df9ff", icon:"⬆", label:"Yüksek Zıplama" },
  grow:      { col:"#ffb24d", icon:"💪", label:"Büyüme (hasarsız)" },
  speed:     { col:"#ffe14d", icon:"»", label:"Hız" },
  shield:    { col:"#6ab0ff", icon:"🛡", label:"Kalkan" },
  doublejump:{ col:"#c77dff", icon:"⤴", label:"Çift Zıplama" },
  magnet:    { col:"#ff7db0", icon:"🧲", label:"Mıknatıs" },
};
// seviyeye uygun buff: yüksek tepe varsa zıplama/çift zıplama, yoksa diğerleri döner
function pickBuff(i,hasHigh){ if(hasHigh) return (i%4===1)?"doublejump":"hijump"; return ["grow","speed","shield","magnet"][(i>>1)%4]; }

// ================= SEVİYE ÜRETİCİ =================
function buildLevel(i){
  const d=i, rng=mulberry32(((i+11)*2654435761)>>>0), hasHigh=(i%2===1), buff=pickBuff(i,hasHigh), bio=biomeFor(i);
  const platforms=[], coins=[], spikes=[], enemies=[], boxes=[], movers=[];
  const G=(a,b)=>platforms.push({x:a,y:GROUND_Y,w:b-a,h:160,kind:"ground"});
  const PL=(x,y,w)=>platforms.push({x,y,w,h:18,kind:"plat"});
  const WALL=(x,h,w)=>platforms.push({x,y:GROUND_Y-h,w,h,kind:"wall"});
  const SPK=(x,w)=>spikes.push({x,y:GROUND_Y-16,w,h:16});
  const COIN=(x,y)=>coins.push({x,y,got:false,special:false});
  const SPECIAL=(x,y)=>coins.push({x,y,got:false,special:true});
  const EN=(t,x,a,b,y)=>enemies.push(mkEnemy(t,x,a,b,y));
  const MOVERH=(x,y,w,h,amp,sp)=>{ const m={kind:"mover",x,y,w,h,bx:x,by:y,ax:amp,ay:0,sp,ph:rng()*6,dx:0}; movers.push(m); platforms.push(m); };
  const MOVERV=(x,y,w,h,amp,sp)=>{ const m={kind:"mover",x,y,w,h,bx:x,by:y,ax:0,ay:amp,sp,ph:rng()*6,dx:0}; movers.push(m); platforms.push(m); };
  const pool=()=>{ const p=["walker"]; if(d>=2)p.push("runner"); if(d>=5)p.push("runner"); if(d>=6)p.push("hopper"); if(d>=9)p.push("tank");
    if(d>=14)p.push("flyer"); if(d>=20)p.push("hopper","flyer"); if(d>=26)p.push("brute"); return p; };
  const etype=()=>{ const p=pool(); return p[(rng()*p.length)|0]; };
  let x=0;

  function flat(){ const w=300+(rng()*160|0); G(x,x+w); if(rng()<0.55)COIN(x+w/2,400); if(rng()<0.5)EN(etype(),x+w*0.6,x+50,x+w-50); x+=w; }
  function enemyZone(){ const w=400+(rng()*160|0); G(x,x+w); const n=1+(d>=4?1:0)+(d>=10?1:0)+(d>=30?1:0); for(let k=0;k<n;k++)EN(etype(),x+90+k*110,x+50,x+w-50); COIN(x+w/2,400); x+=w; }
  function gap(){ const pre=130; G(x,x+pre); const gw=Math.min(70+d*5,118); COIN(x+pre+gw/2,360); const post=170; G(x+pre+gw,x+pre+gw+post); if(rng()<0.5)EN(etype(),x+pre+gw+post*0.5,x+pre+gw+30,x+pre+gw+post-30); x+=pre+gw+post; }
  function doubleGap(){ const pre=120; G(x,x+pre); const gw=Math.min(64+d*4,104),mid=110,post=160; G(x+pre+gw,x+pre+gw+mid); COIN(x+pre+gw+mid/2,400); G(x+pre+gw+mid+gw,x+pre+gw+mid+gw+post); x+=pre+gw+mid+gw+post; }
  function stairs(){ const w=600; G(x,x+w); const up=rng()<0.5; for(let k=0;k<3;k++){ const yy=up?380-k*0:380-(2-k)*46; PL(x+120+k*130,up?380-k*46:380-(2-k)*46,90); COIN(x+165+k*130,(up?380-k*46:380-(2-k)*46)-28); } if(rng()<0.6)EN(etype(),x+w*0.8,x+w*0.6,x+w-40); x+=w; }
  function wall(){ const w=560; G(x,x+w); const h=Math.min(52+d*4,90); WALL(x+240,h,34); COIN(x+340,400); EN(etype(),x+440,x+390,x+520); x+=w; }
  function spikePit(){ const w=600; G(x,x+w); const sw=Math.min(56+d*5,106); SPK(x+250,sw); COIN(x+250+sw/2,360); if(rng()<0.5)EN(etype(),x+w*0.85,x+w*0.65,x+w-40); x+=w; }
  function pillars(){ const w=700; const pre=130; G(x,x+pre); let px=x+pre+90; for(let k=0;k<3;k++){ PL(px-40,360,80); COIN(px,330); px+=125; } G(px+10,x+w); x+=w; }
  function movingWall(){ const w=620; G(x,x+w); MOVERH(x+300,GROUND_Y-100,24,100,110+Math.min(d*4,100),1.4+rng()*0.7); COIN(x+w*0.8,400); if(rng()<0.6)EN(etype(),x+w*0.85,x+w*0.6,x+w-40); x+=w; }
  function elevator(){ const w=560; const pre=170; G(x,x+pre); const gw=108; MOVERV(x+pre+gw/2-50,GROUND_Y-110,100,18,70,1.15); COIN(x+pre+gw/2,250); G(x+pre+gw,x+w); x+=w; } // boşluk atlanabilir; asansör yüksek coin için bonus
  function flyZone(){ const w=460; G(x,x+w); EN("flyer",x+w*0.5,x+50,x+w-50); EN("flyer",x+w*0.7,x+50,x+w-50); COIN(x+w*0.5,360); x+=w; }
  function tower(){ const w=640; G(x,x+w); PL(x+210,360,90); PL(x+320,300,90); PL(x+230,240,130); SPECIAL(x+270,225); SPECIAL(x+320,225); EN("runner",x+300,x+230,x+370,240-28); x+=w; }

  const startG=300+(rng()*220|0); G(0,startG); x=startG; COIN(160,400);
  const openers=[flat,enemyZone,stairs]; if(d>=3)openers.push(gap); if(d>=5)openers.push(wall);
  openers[(rng()*openers.length)|0]();
  if(d>=2 && rng()<0.7)(rng()<0.5?enemyZone:flat)();

  const targetW=2800+Math.min(i,60)*150+(rng()*1500|0); let last="", boxDone=false, towerDone=false;
  while(x<targetW){
    const opts=["flat","enemyZone","stairs"]; if(d>=3)opts.push("gap"); if(d>=4)opts.push("movingWall"); if(d>=5)opts.push("wall");
    if(d>=7)opts.push("dgap","elevator"); if(d>=9)opts.push("spike"); if(d>=11)opts.push("pillars"); if(d>=14)opts.push("flyZone");
    // zorlukla birlikte tehlikeli chunk'ları çoğalt
    if(d>=20)opts.push("gap","spike","movingWall"); if(d>=40)opts.push("spike","flyZone","dgap");
    if(!boxDone && x>targetW*0.45){ const w=360; G(x,x+w); boxes.push({x:x+w/2-18,y:300,w:36,h:36,kind:"box",used:false,bump:0,buff,t:rng()*6}); EN(etype(),x+w*0.78,x+60,x+w-40); x+=w; boxDone=true; last="box"; continue; }
    if(hasHigh && !towerDone && x>targetW*0.62){ tower(); towerDone=true; last="tower"; continue; }
    let pick,tries=0; do{ pick=opts[(rng()*opts.length)|0]; tries++; }while(pick===last&&tries<7); last=pick;
    ({flat,enemyZone,stairs,gap,wall,dgap:doubleGap,spike:spikePit,pillars,movingWall,elevator,flyZone}[pick])();
  }
  if(!boxDone){ const w=360; G(x,x+w); boxes.push({x:x+w/2-18,y:300,w:36,h:36,kind:"box",used:false,bump:0,buff,t:rng()*6}); x+=w; }
  if(hasHigh && !towerDone) tower();
  G(x,x+700); x+=700;
  const width=x;
  const minE=3+Math.floor(i*0.35); let guard=0, gs=platforms.filter(p=>p.kind==="ground");
  while(enemies.length<minE && guard++<60){ const s=gs[2+((guard*3)%Math.max(1,gs.length-3))]||gs[1]; if(!s||s.w<160)continue; EN(etype(), s.x+70+(rng()*(s.w-140)), s.x+30, s.x+s.w-30); }
  const villain={ x:width-360, y:GROUND_Y, bob:0 };
  // arka plan dekoru (biyoma özel, tohumlu — her bölüm farklı görünür)
  const decoSet={ grass:["tree","bush","tree"], sand:["cactus","rock"], slum:["shack","pole","shack"],
    cave:["crystal","stalag","crystal"], ice:["pine","iglo","pine"], fire:["torch","pillar"], volcano:["pillar","lavarock"] };
  const dset=decoSet[bio.kind]||["tree"]; const deco=[];
  for(let dx=120; dx<width-200; dx+=200+(rng()*220|0)) deco.push({x:dx, type:dset[(rng()*dset.length)|0], s:0.8+rng()*0.7});
  // günün saati (bölüm bazlı varyasyon)
  const tod=["day","day","dawn","dusk","night"][(i*3+ (rng()*5|0))%5];
  return { name:bio.name, biome:bio, width, sky:bio.sky, platforms, coins, spikes, enemies, boxes, movers, villain, buff, chaseX:width-560, deco, tod, boss:isBossLevel(i) };
}

function makeAmbient(type){ const a=[]; if(type==="none")return a; const n=type==="snow"?70:type==="ember"?55:type==="glow"?40:50;
  for(let k=0;k<n;k++)a.push({x:Math.random()*W,y:Math.random()*H,t:type,ph:Math.random()*6,sz:1+Math.random()*2.5,sp:0.3+Math.random()}); return a; }
function updateAmbient(dt){ if(!state||!state.amb)return; for(const a of state.amb){ a.ph+=dt;
  if(a.t==="snow"){ a.y+=40*a.sp*dt; a.x+=Math.sin(a.ph)*12*dt; if(a.y>H){a.y=-4;a.x=Math.random()*W;} }
  else if(a.t==="ember"){ a.y-=55*a.sp*dt; a.x+=Math.sin(a.ph*3)*10*dt; if(a.y<-4){a.y=H+4;a.x=Math.random()*W;} }
  else if(a.t==="dust"){ a.x+=18*a.sp*dt; a.y+=Math.sin(a.ph)*6*dt; if(a.x>W){a.x=-4;a.y=Math.random()*H;} }
  else if(a.t==="glow"){ a.x+=Math.sin(a.ph)*8*dt; a.y+=Math.cos(a.ph*0.7)*8*dt; }
  else if(a.t==="leaf"){ a.y+=26*a.sp*dt; a.x+=Math.sin(a.ph*2)*16*dt; if(a.y>H){a.y=-4;a.x=Math.random()*W;} } } }
function drawAmbient(){ if(!state||!state.amb)return; for(const a of state.amb){
  if(a.t==="snow"){ ctx.fillStyle="rgba(255,255,255,0.85)"; ctx.beginPath(); ctx.arc(a.x,a.y,a.sz,0,7); ctx.fill(); }
  else if(a.t==="ember"){ ctx.fillStyle="rgba(255,"+(120+((Math.sin(a.ph*6)*60)|0))+",40,0.9)"; ctx.fillRect(a.x,a.y,a.sz,a.sz); }
  else if(a.t==="dust"){ ctx.fillStyle="rgba(220,200,160,0.3)"; ctx.fillRect(a.x,a.y,a.sz,a.sz); }
  else if(a.t==="glow"){ ctx.globalAlpha=0.4+0.4*Math.sin(a.ph*2); ctx.fillStyle="#9af0ff"; ctx.beginPath(); ctx.arc(a.x,a.y,a.sz,0,7); ctx.fill(); ctx.globalAlpha=1; }
  else if(a.t==="leaf"){ ctx.fillStyle="rgba(120,170,90,0.8)"; ctx.save(); ctx.translate(a.x,a.y); ctx.rotate(a.ph*2); ctx.fillRect(-a.sz,-a.sz*0.5,a.sz*2,a.sz); ctx.restore(); } } }

  state={score:0,t:0,buffT:0,buffType:null,popups:[],deathT:0};
  const s=fromSave?loadSave():null; if(s){ state.score=s.score||0; loadLevel(s.lvl||0); } else loadLevel(0); }

  const L=buildLevel(idx); for(const b of L.boxes)L.platforms.push(b);
  if(!state)state={popups:[]}; state.score=sc;
  state.levelIdx=idx; state.level=L; state.biome=L.biome; state.platforms=L.platforms; state.boxes=L.boxes; state.movers=L.movers;
  state.coins=L.coins; state.spikes=L.spikes; state.enemies=L.enemies; state.villain=L.villain; state.chaseX=L.chaseX; state.width=L.width;

  const ups=getShop().upgrades||[]; state.up={ shield:ups.includes("startshield"), dcoin:ups.includes("doublecoin"), magnet:ups.includes("magnet"), djump:ups.includes("doublejump") };
  state.p={ x:70,y:GROUND_Y-38,w:32,h:42,vx:0,vy:0,onGround:true,coyote:0,face:1,invuln:0.6,walk:0,squash:0,blink:1,spin:0,djAvail:true };
  state.lastSafe={x:70,y:GROUND_Y-42};
  state.cam=0; state.particles=[]; state.buffT=0; state.buffType=null; state.popups=state.popups||[]; state.deathT=0;

}
function pHit(px,py,pw,ph,b){ return px<b.x+b.w && px+pw>b.x && py<b.y+b.h && py+ph>b.y; }
function over(a,b){ return a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y; }
function burst(x,y,c,n){ for(let k=0;k<n;k++){ const a=Math.random()*6.28,s=Math.random()*180+40; state.particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-80,life:.5,color:c}); } }
function popup(text,color){ state.popups.push({text,color,t:0,x:state.p.x+state.p.w/2,y:state.p.y-10}); }

  const b=BUFFS[type]; popup(b.icon+" "+b.label.toUpperCase(),b.col); burst(state.p.x+15,state.p.y+10,b.col,18); }

// ================= GÜNCELLE =================
let buffer=0;
function update(dt){
  if(!state)return; state.t+=dt; updateAmbient(dt);
  for(const pu of state.popups)pu.t+=dt; state.popups=state.popups.filter(pu=>pu.t<1.6);
  for(const pt of state.particles){ pt.vy+=900*dt; pt.x+=pt.vx*dt; pt.y+=pt.vy*dt; pt.life-=dt; }
  state.particles=state.particles.filter(pt=>pt.life>0);
  for(const m of state.movers){ m.ph+=dt*m.sp; const nx=m.bx+Math.sin(m.ph)*m.ax, ny=m.by+Math.sin(m.ph)*m.ay; m.dx=nx-m.x; m.dy=ny-m.y; m.x=nx; m.y=ny; }

  if(shake>0)shake-=dt;
  if(phase==="title"){ titleT-=dt; if(titleT<=0)phase="play"; return; }
  if(phase==="dead"||phase==="menu"||phase==="ending")return;
  const p=state.p, L=state.level;
  if(phase==="dying"){ state.deathT+=dt; p.vy+=GRAV*dt; p.y+=p.vy*dt; p.spin+=dt*9; if(state.deathT>1.25)showDeath(); return; }

  if(state.buffT>0){ state.buffT-=dt; if(state.buffT<=0)state.buffType=null; }
  const grown=state.buffType==="grow"&&state.buffT>0, hij=state.buffType==="hijump"&&state.buffT>0;
  const nw=grown?44:32, nh=grown?56:42;
  if(nh!==p.h){ p.y-=(nh-p.h); p.x-=(nw-p.w)/2; }   // boyut değişince ayakları sabit tut (büyürken düşme yok)
  p.w=nw; p.h=nh;

  if(phase==="chase"){ state.villain.x+=235*dt; state.villain.bob+=dt*10;
    p.face=1; if(p.vx<MAXVX)p.vx+=MOVE*dt; p.x+=p.vx*dt; p.vy+=GRAV*dt; p.y+=p.vy*dt; p.onGround=false; p.walk+=Math.abs(p.vx)*dt*0.05;
    for(const b of state.platforms){ if(pHit(p.x,p.y,p.w,p.h,b)){ if(p.vy>0){p.y=b.y-p.h;p.vy=0;p.onGround=true;} } }
    if(p.x>state.width-50)nextLevel(); return; }

  const speedB=state.buffType==="speed"&&state.buffT>0, mag=(state.buffType==="magnet"&&state.buffT>0)||state.up.magnet,
        dj=(state.buffType==="doublejump"&&state.buffT>0)||state.up.djump, sh=state.buffType==="shield"&&state.buffT>0;
  const spd=speedB?MAXVX*1.5:(grown?MAXVX*0.92:MAXVX), accel=speedB?MOVE*1.3:MOVE;
  const dir=(keys.ArrowRight?1:0)-(keys.ArrowLeft?1:0);
  if(dir){ p.vx+=dir*accel*dt; p.face=dir; } else { const f=FRICTION*dt; if(p.vx>0)p.vx=Math.max(0,p.vx-f); else p.vx=Math.min(0,p.vx+f); }
  p.vx=Math.max(-spd,Math.min(spd,p.vx));
  for(const m of state.movers){ const onTop=p.onGround && (p.y+p.h)>=m.y-9 && (p.y+p.h)<=m.y+12 && p.x<m.x+m.w && p.x+p.w>m.x;
    if(onTop){ p.x+=m.dx; p.y+=m.dy; } else if(m.ax!==0 && over(p,m)){ p.x+=m.dx; } }

  const jf=hij?JUMP_HI:JUMP;
  if(p.onGround) p.djAvail=true;
  if(jumpQueued){ buffer=BUFFER; jumpQueued=false; }
  if(buffer>0)buffer-=dt; if(p.coyote>0)p.coyote-=dt;
  if(buffer>0 && (p.onGround||p.coyote>0)){ p.vy=-jf; p.onGround=false; p.coyote=0; buffer=0; p.squash=-1; (hij?sfx.big:sfx.jump)(); burst(p.x+p.w/2,p.y+p.h,"#fff",5); }
  else if(buffer>0 && dj && p.djAvail && !p.onGround){ p.vy=-JUMP*0.96; p.djAvail=false; buffer=0; p.squash=-1; sfx.jump(); burst(p.x+p.w/2,p.y+p.h/2,"#c77dff",12); }
  if(!jumpHeld && p.vy<0)p.vy*=0.86;
  p.vy+=GRAV*dt; if(p.vy>950)p.vy=950;

  p.x+=p.vx*dt;
  for(const b of state.platforms){ if(pHit(p.x,p.y,p.w,p.h,b)){ if(p.vx>0)p.x=b.x-p.w; else if(p.vx<0)p.x=b.x+b.w; p.vx=0; } }
  if(p.x<0)p.x=0;
  const wasAir=!p.onGround; p.y+=p.vy*dt; p.onGround=false;
  for(const b of state.platforms){ if(pHit(p.x,p.y,p.w,p.h,b)){
    if(p.vy>0){ p.y=b.y-p.h; p.vy=0; p.onGround=true; p.coyote=COYOTE; if(wasAir)p.squash=1; if(b.kind==="box")activateBox(b); if(b.kind==="ground")state.lastSafe={x:Math.max(b.x+20,Math.min(p.x,b.x+b.w-40)),y:b.y-p.h}; }
    else if(p.vy<0){ p.y=b.y+b.h; p.vy=0; if(b.kind==="box")activateBox(b); } } }
  if(p.invuln>0)p.invuln-=dt;

  if(p.y>H+30){ die(); return; }
  for(const s of state.spikes){ if(over(p,s)){ if(sh){ breakShield(); p.vy=-360; break; } die(); return; } }

  if(p.onGround && Math.abs(p.vx)>12)p.walk+=Math.abs(p.vx)*dt*0.055; else p.walk*=0.8;
  if(p.squash>0)p.squash=Math.max(0,p.squash-dt*5); if(p.squash<0)p.squash=Math.min(0,p.squash+dt*5);
  p.blink-=dt; if(p.blink<0)p.blink=2+Math.random()*3;
  for(const b of state.boxes) if(b.bump>0)b.bump-=dt;
  state.villain.bob+=dt*3;
  if(phase==="play" && p.x>state.chaseX){ if(state.level.boss) startBoss(); else { phase="chase"; sfx.laugh(); } }

  // ---- BOSS DÖVÜŞÜ ----
  if(phase==="boss" && state.boss){ const bo=state.boss; state.villain.bob+=dt*8;
    p.x=Math.max(state.bossCam+24, Math.min(state.width-46, p.x));   // arenada tut
    if(bo.hurt>0)bo.hurt-=dt; if(bo.invuln>0)bo.invuln-=dt;
    if(!bo.defeated){
      bo.x += Math.sign((p.x+p.w/2)-bo.x)*bo.vx*dt; bo.x=Math.max(state.bossCam+130,Math.min(state.width-70,bo.x));
      bo.atkCd-=dt; if(bo.atkCd<=0){ bo.atkCd=1.5-Math.min(0.6,state.levelIdx*0.01); const a=Math.sign((p.x)-bo.x)||1;
        bossOrbs.push({x:bo.x,y:GROUND_Y-72,vx:a*(170+Math.random()*60),vy:-150,life:3}); sfx.hurt(); }
      const bb={x:bo.x-26,y:GROUND_Y-80,w:52,h:80};
      if(over(p,bb)&&p.invuln<=0){
        if(p.vy>0 && p.y+p.h-16<bb.y && bo.invuln<=0){ bo.hp--; bo.hurt=0.3; bo.invuln=0.7; p.vy=-JUMP*0.8; p.squash=-1; shake=0.35; sfx.stomp(); burst(bo.x,bb.y,"#ff6b6b",16); if(bo.hp<=0){ bo.defeated=0.001; shake=0.6; } }
        else if(state.buffType==="grow"&&state.buffT>0){ p.vx=-p.face*200; }
        else { die(); return; }
      }
    } else { bo.defeated+=dt; if(Math.random()<0.5)burst(bo.x+(Math.random()-0.5)*50,GROUND_Y-30-Math.random()*60,"#ffd24d",2);
      if(bo.defeated>1.8){ if(state.levelIdx>=LEVEL_COUNT-1) showEnding(); else { phase="chase"; state.villain.x=bo.x; } } }
  }
  // boss mermileri
  for(const o of bossOrbs){ o.life-=dt; o.vy+=GRAV*0.5*dt; o.x+=o.vx*dt; o.y+=o.vy*dt;
    if(p.invuln<=0 && Math.hypot((p.x+p.w/2)-o.x,(p.y+p.h/2)-o.y)<22){
      if(state.buffType==="grow"&&state.buffT>0){ o.life=0; }
      else if(state.buffType==="shield"&&state.buffT>0){ breakShield(); o.life=0; }
      else { die(); return; }
    } }
  bossOrbs=bossOrbs.filter(o=>o.life>0 && o.y<H+20);

  for(const e of state.enemies){ if(e.dead){ e.dead-=dt; continue; } e.phase+=dt*6;
    e.x+=e.vx*dt; if(e.x<e.minx){e.x=e.minx;e.vx=Math.abs(e.vx);} if(e.x>e.maxx){e.x=e.maxx;e.vx=-Math.abs(e.vx);}
    if(e.type==="hopper"){ e.hopCd-=dt; if(e.onGround&&e.hopCd<=0){ e.vy=-470; e.onGround=false; e.hopCd=1.1+Math.random(); } e.vy+=GRAV*dt; e.y+=e.vy*dt; if(e.y>=e.gy){ e.y=e.gy; e.vy=0; e.onGround=true; } }
    else if(e.type==="flyer"){ e.y=e.flyY+Math.sin(e.phase)*26; }
    if(over(p,e) && p.invuln<=0){
      if(p.vy>0 && p.y+p.h-14<e.y){ e.hp--; p.vy=-JUMP*0.6; p.squash=-1; sfx.stomp(); burst(e.x+e.w/2,e.y,"#ff6b6b",10); if(e.hp<=0){e.dead=0.3;state.score+=50;}else{e.col="#555";state.score+=20;} }
      else if(grown){ e.hp=0; e.dead=0.3; state.score+=50; p.invuln=0.15; sfx.stomp(); burst(e.x+e.w/2,e.y,"#ffb24d",12); }
      else if(sh){ breakShield(); p.vx=-p.face*220; p.vy=-220; }
      else { die(); return; }
    }
  }
  for(const c of state.coins){ if(c.got)continue;
    if(mag){ const dx=(p.x+p.w/2)-c.x, dy=(p.y+p.h/2)-c.y, dd=Math.hypot(dx,dy)||1; if(dd<180){ c.x+=dx/dd*280*dt; c.y+=dy/dd*280*dt; } }
    if(pHit(p.x,p.y,p.w,p.h,{x:c.x-13,y:c.y-13,w:26,h:26})){ c.got=true; state.score+=c.special?50:10; addCoins((c.special?5:1)*(state.up.dcoin?2:1)); (c.special?sfx.special:sfx.coin)(); burst(c.x,c.y,c.special?"#ff7df0":"#ffe14d",c.special?14:8); if(c.special)popup("+50 ✨","#ff7df0"); } }
  const target=phase==="boss"?state.bossCam:Math.max(0,Math.min(L.width-W,p.x+p.w/2-W/2)); state.cam+=(target-state.cam)*Math.min(1,dt*8);
}

function draw(){
  if(!state){ ctx.fillStyle="#5bb8f0"; ctx.fillRect(0,0,W,H); return; }
  const bio=state.biome, cam=state.cam, L=state.level;
  const sky=ctx.createLinearGradient(0,0,0,H); sky.addColorStop(0,bio.sky[0]); sky.addColorStop(0.62,bio.sky[1]); sky.addColorStop(1,bio.sky[2]);
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);
  applyTimeTint(L.tod);  // günün saati varyasyonu
  // dağ silüeti (parallax)
  ctx.fillStyle=bio.mtn; const seed=state.levelIdx*7;
  for(let i=0;i<10;i++){ const mx=((i*360-cam*0.18+seed)%3600+3600)%3600-200, mh=120+((i*53+seed)%90);
    ctx.beginPath(); ctx.moveTo(mx-150,GROUND_Y); ctx.lineTo(mx,GROUND_Y-mh); ctx.lineTo(mx+150,GROUND_Y); ctx.fill();
    if(bio.kind==="ice"){ ctx.fillStyle="#fff"; ctx.beginPath(); ctx.moveTo(mx-34,GROUND_Y-mh+34); ctx.lineTo(mx,GROUND_Y-mh); ctx.lineTo(mx+34,GROUND_Y-mh+34); ctx.fill(); ctx.fillStyle=bio.mtn; }
  }
  if(bio.kind!=="cave"&&bio.kind!=="fire"){ ctx.fillStyle="rgba(255,255,255,0.55)"; for(let i=0;i<7;i++){ let cx=((i*360-cam*0.25)%2520+2520)%2520-120; cloud(cx,55+(i%3)*36,1+(i%2)*0.3); } }
  for(let layer=0;layer<2;layer++){ ctx.fillStyle=layer?bio.hill2:bio.hill; const f=0.4+layer*0.2;
    for(let i=0;i<18;i++){ const hx=((i*300-cam*f)%5400+5400)%5400-150; ctx.beginPath(); ctx.ellipse(hx,GROUND_Y+10+layer*8,200-layer*40,150-layer*30,0,Math.PI,0); ctx.fill(); } }

  const shx=shake>0?(Math.random()-0.5)*shake*30:0, shy=shake>0?(Math.random()-0.5)*shake*30:0;
  ctx.save(); ctx.translate(-cam+shx,shy);
  if(L.deco)for(const dc of L.deco)drawDeco(dc,bio);   // biyoma özel arka plan dekoru
  for(const b of state.platforms){
    if(b.kind==="ground")drawGround(b,bio);
    else if(b.kind==="plat"){ ctx.fillStyle=bio.platB; roundRect(b.x,b.y,b.w,b.h,5); ctx.fill(); ctx.fillStyle=bio.platT; ctx.fillRect(b.x+2,b.y,b.w-4,6); }
    else if(b.kind==="wall"){ ctx.fillStyle="#5b5550"; roundRect(b.x,b.y,b.w,b.h,4); ctx.fill(); ctx.fillStyle="#6e6760"; for(let yy=b.y+6;yy<b.y+b.h-4;yy+=14)ctx.fillRect(b.x+3,yy,b.w-6,6); ctx.fillStyle="#807868"; ctx.fillRect(b.x,b.y,b.w,5); }
    else if(b.kind==="mover"){ ctx.fillStyle="#4a6fa0"; roundRect(b.x,b.y,b.w,b.h,4); ctx.fill(); ctx.fillStyle="#7da0d0"; ctx.fillRect(b.x,b.y,b.w,Math.min(6,b.h)); ctx.fillStyle="#2e4870"; for(let yy=b.y+8;yy<b.y+b.h-3;yy+=10)ctx.fillRect(b.x+3,yy,b.w-6,3); }
    else if(b.kind==="box")drawBox(b);
  }
  for(const s of state.spikes){ ctx.fillStyle=bio.spike; ctx.strokeStyle=shade(bio.spike,-0.3); ctx.lineWidth=1; for(let sx=s.x;sx<s.x+s.w-6;sx+=14){ ctx.beginPath(); ctx.moveTo(sx,s.y+s.h); ctx.lineTo(sx+7,s.y); ctx.lineTo(sx+14,s.y+s.h); ctx.fill(); ctx.stroke(); } }
  if(phase==="boss")drawBoss(); else drawVillain(state.villain);
  for(const o of bossOrbs){ ctx.fillStyle="#b06cff"; ctx.shadowColor="#a05cff"; ctx.shadowBlur=12; ctx.beginPath(); ctx.arc(o.x,o.y,9,0,7); ctx.fill(); ctx.shadowBlur=0; }
  for(const c of state.coins){ if(c.got)continue; const bob=Math.sin(state.t*3+c.x)*3;
    if(c.special){ ctx.save(); ctx.translate(c.x,c.y+bob); ctx.rotate(state.t*2); ctx.fillStyle="#ff7df0"; star(0,0,10,5); ctx.restore(); }
    else { const sw=Math.abs(Math.cos(state.t*4+c.x)); ctx.fillStyle="#ffe14d"; ctx.strokeStyle="#c79a16"; ctx.lineWidth=2; ctx.beginPath(); ctx.ellipse(c.x,c.y+bob,5+4*sw,9,0,0,7); ctx.fill(); ctx.stroke(); } }
  for(const e of state.enemies)drawEnemy(e);
  drawPlayer();
  for(const pt of state.particles){ ctx.globalAlpha=Math.max(0,pt.life/0.5); ctx.fillStyle=pt.color; ctx.fillRect(pt.x-2,pt.y-2,4,4); }
  ctx.globalAlpha=1;
  for(const pu of state.popups){ const a=pu.t<1.3?1:Math.max(0,(1.6-pu.t)/0.3); const sc=Math.min(1,pu.t*5); ctx.globalAlpha=a; ctx.fillStyle=pu.color; ctx.font="bold "+(20*sc)+"px Fredoka,system-ui"; ctx.textAlign="center"; ctx.fillText(pu.text,pu.x,pu.y-pu.t*40); ctx.textAlign="left"; ctx.globalAlpha=1; }

  ctx.fillStyle="#1a2336cc"; roundRect(10,10,250,(state.buffT>0?80:42),8); ctx.fill();
  ctx.fillStyle="#fff"; ctx.font="16px Fredoka,system-ui"; ctx.fillText("⭐ "+state.score,20,34);
  ctx.fillStyle="#cdd6e8"; ctx.font="13px Fredoka,system-ui"; ctx.fillText("Seviye "+(state.levelIdx+1)+" — "+L.name,118,32);
  if(muted){ ctx.fillStyle="#ff8a8a"; ctx.fillText("🔇",234,34); }
  if(state.buffT>0 && state.buffType){ const bf=BUFFS[state.buffType]; ctx.fillStyle=bf.col; ctx.font="13px Fredoka,system-ui"; ctx.fillText(bf.icon+" "+bf.label,20,56); ctx.fillStyle="#0c2230"; ctx.fillRect(20,62,230,8); ctx.fillStyle=bf.col; ctx.fillRect(20,62,230*(state.buffT/BUFF_DUR),8); }
  if(phase==="chase"){ ctx.fillStyle="#fff"; ctx.font="bold 20px Fredoka,system-ui"; ctx.textAlign="center"; ctx.fillText("Kaçıyor! Peşinden!",W/2,40); ctx.textAlign="left"; }
  if(phase==="boss" && state.boss){ const bo=state.boss; ctx.fillStyle="rgba(0,0,0,.55)"; ctx.fillRect(W/2-170,14,340,22);
    ctx.fillStyle="#7a1828"; ctx.fillRect(W/2-166,18,332,14); ctx.fillStyle="#ff4d5e"; ctx.fillRect(W/2-166,18,332*Math.max(0,bo.hp/bo.maxhp),14);
    ctx.fillStyle="#fff"; ctx.font="10px 'Press Start 2P',monospace"; ctx.textAlign="center"; ctx.fillText("GÖLGEHAN",W/2,52); ctx.textAlign="left"; }

  if(phase==="title"){ const pr=1-Math.max(0,titleT-1.0)/0.7, fade=titleT<0.5?titleT/0.5:1;
    ctx.fillStyle="rgba(8,12,22,"+(0.55*fade)+")"; ctx.fillRect(0,0,W,H); ctx.globalAlpha=fade; ctx.textAlign="center";
    ctx.fillStyle="#fff"; ctx.font="bold "+(52*Math.min(1,pr*1.4))+"px Fredoka,system-ui"; ctx.fillText("SEVİYE "+(state.levelIdx+1),W/2,H/2-10);
    ctx.fillStyle=bio.top; ctx.font="22px Fredoka,system-ui"; ctx.fillText(L.name,W/2,H/2+34); ctx.textAlign="left"; ctx.globalAlpha=1; }
}

function drawGround(b,bio){
  ctx.fillStyle=bio.ground; ctx.fillRect(b.x,b.y+14,b.w,b.h-14);
  ctx.fillStyle=bio.top; ctx.fillRect(b.x,b.y,b.w,16);
  const k=bio.kind;
  if(k==="grass"){ ctx.fillStyle="rgba(0,0,0,0.12)"; for(let gx=b.x;gx<b.x+b.w;gx+=24)ctx.fillRect(gx,b.y-4,3,5); }
  else if(k==="sand"){ ctx.fillStyle="rgba(255,255,255,0.18)"; for(let gx=b.x;gx<b.x+b.w;gx+=20)ctx.fillRect(gx,b.y+5,4,2); }
  else if(k==="slum"){ ctx.fillStyle="rgba(0,0,0,0.18)"; for(let gx=b.x;gx<b.x+b.w;gx+=26)ctx.fillRect(gx,b.y+3,6,3); }
  else if(k==="ice"){ ctx.fillStyle="rgba(255,255,255,0.5)"; ctx.fillRect(b.x,b.y+1,b.w,3); for(let gx=b.x;gx<b.x+b.w;gx+=40)ctx.fillRect(gx,b.y+18,14,2); }
  else if(k==="cave"){ ctx.fillStyle="#6a5cc0"; ctx.globalAlpha=0.4+0.2*Math.sin(state.t*2); ctx.fillRect(b.x,b.y,b.w,2); ctx.globalAlpha=1; }
  else if(k==="fire"||k==="volcano"){ ctx.fillStyle="#ff8a2a"; ctx.globalAlpha=0.5+0.3*Math.sin(state.t*4+b.x); ctx.fillRect(b.x,b.y-2,b.w,3); ctx.globalAlpha=1;
    ctx.fillStyle="rgba(0,0,0,0.25)"; for(let gx=b.x;gx<b.x+b.w;gx+=30){ ctx.fillRect(gx,b.y+22,26,2); ctx.fillRect(gx+13,b.y+40,26,2); } }
}
function drawBox(b){
  const cx=b.x+b.w/2, cy=b.y+b.h/2-(b.bump>0?Math.sin((0.28-b.bump)/0.28*Math.PI)*10:0)+Math.sin(state.t*2.5+b.t)*3;
  const bf=BUFFS[b.buff]||BUFFS.grow, col=b.used?"#6b6470":bf.col;
  ctx.save(); ctx.translate(cx,cy);
  if(!b.used){ ctx.globalAlpha=0.35+0.15*Math.sin(state.t*5); ctx.fillStyle=col; ctx.beginPath(); ctx.arc(0,0,24,0,7); ctx.fill(); ctx.globalAlpha=1; ctx.shadowColor=col; ctx.shadowBlur=14; }
  ctx.rotate(Math.PI/4); ctx.fillStyle=col; roundRect(-13,-13,26,26,5); ctx.fill(); ctx.fillStyle="rgba(255,255,255,0.5)"; roundRect(-8,-10,7,18,3); ctx.fill(); ctx.rotate(-Math.PI/4); ctx.shadowBlur=0;
  ctx.fillStyle=b.used?"#3a3640":"#fff"; ctx.font="bold 15px Fredoka,system-ui"; ctx.textAlign="center"; ctx.fillText(b.used?"·":bf.icon,0,6); ctx.textAlign="left";
  if(!b.used){ for(let k=0;k<3;k++){ const a=state.t*2+k*2.1; ctx.fillStyle=col; ctx.globalAlpha=0.8; ctx.fillRect(Math.cos(a)*20-1.5,Math.sin(a)*20-1.5,3,3); } ctx.globalAlpha=1; }
  ctx.restore();
}
function drawVillain(v){
  const chasing=phase==="chase", run=Math.sin(v.bob);
  ctx.save(); ctx.translate(v.x, GROUND_Y); if(!chasing)ctx.scale(-1,1);
  ctx.strokeStyle="#140c1e"; ctx.lineWidth=7; ctx.lineCap="round"; const ls=chasing?run*10:2;
  ctx.beginPath(); ctx.moveTo(-5,-30); ctx.lineTo(-5+ls,-1); ctx.moveTo(6,-30); ctx.lineTo(6-ls,-1); ctx.stroke();
  ctx.fillStyle="#241540"; ctx.beginPath(); ctx.moveTo(-15,-30); ctx.lineTo(15,-30); ctx.lineTo(22,-64); ctx.lineTo(-13,-64); ctx.closePath(); ctx.fill();
  ctx.fillStyle="#352055"; roundRect(-13,-74,26,46,9); ctx.fill();
  ctx.fillStyle="#160e26"; ctx.beginPath(); ctx.moveTo(-14,-66); ctx.lineTo(0,-96); ctx.lineTo(14,-66); ctx.closePath(); ctx.fill();
  ctx.fillStyle="#0a0612"; ctx.beginPath(); ctx.arc(1,-72,10,Math.PI*0.85,Math.PI*0.15); ctx.fill();
  ctx.fillStyle="#ff3a44"; ctx.shadowColor="#ff3a44"; ctx.shadowBlur=6; ctx.fillRect(-3,-74,5,4); ctx.fillRect(4,-74,5,4); ctx.shadowBlur=0;
  ctx.strokeStyle="#3a2c1c"; ctx.lineWidth=4; ctx.beginPath(); ctx.moveTo(-11,-54); ctx.lineTo(-24,-90); ctx.stroke();
  ctx.fillStyle="#a05cff"; ctx.shadowColor="#a05cff"; ctx.shadowBlur=10; ctx.beginPath(); ctx.arc(-24,-94,6,0,7); ctx.fill(); ctx.shadowBlur=0;
  ctx.save(); ctx.translate(17,-60);
  ctx.fillStyle="#ff7eb0"; roundRect(-8,-2,16,20,6); ctx.fill();
  ctx.fillStyle="#f3c9a0"; ctx.beginPath(); ctx.arc(0,-9,6.5,0,7); ctx.fill();
  ctx.fillStyle="#6a3f22"; ctx.beginPath(); ctx.arc(0,-12,6.5,Math.PI,0); ctx.fill(); ctx.beginPath(); ctx.arc(8,-7,3.5,0,7); ctx.fill();
  ctx.fillStyle="#222"; ctx.fillRect(-3,-10,2,2); ctx.fillRect(1,-10,2,2);
  const w2=Math.sin(state.t*12)*5; ctx.strokeStyle="#f3c9a0"; ctx.lineWidth=2.6; ctx.beginPath(); ctx.moveTo(-7,2); ctx.lineTo(-13,-7+w2); ctx.moveTo(7,2); ctx.lineTo(13,-7-w2); ctx.stroke();
  ctx.restore(); ctx.restore();

function drawBoss(){ const bo=state.boss; if(!bo)return;

function drawEnemy(e){ const dead=e.dead>0, fd=e.vx>0?1:-1, wob=Math.sin(e.phase), W2=e.w/2, hh=e.h, dk=shade(e.col,-0.22), lt=shade(e.col,0.2);

    ctx.fillStyle=e.col; roundRect(-W2*0.55,-hh,W2*1.1,hh,5); ctx.fill();

function drawPlayer(){
  const p=state.p; const bt=state.buffT>0?state.buffType:null;
  if(phase==="play" && p.invuln>0 && bt!=="shield" && Math.floor(p.invuln*12)%2===0)return;
  const grown=bt==="grow", hij=bt==="hijump", speedB=bt==="speed", shB=bt==="shield", magB=bt==="magnet", djB=bt==="doublejump";
  const cx=p.x+p.w/2, by=p.y+p.h, fd=p.face;
  let sx=1,sy=1,rot=0;
  if(phase==="dying")rot=p.spin;
  else { if(!p.onGround && phase!=="chase"){ if(p.vy<0){sy=1.12;sx=0.92;}else{sy=0.94;sx=1.07;} } if(p.squash>0){sy=1-0.24*p.squash;sx=1+0.24*p.squash;} if(p.squash<0){sy=1+0.2*(-p.squash);sx=1-0.2*(-p.squash);} }

    ctx.globalAlpha=0.7; ctx.fillStyle="#7df9ff"; ctx.beginPath(); ctx.moveTo(cx-7,by-2); ctx.lineTo(cx,by+14+Math.sin(state.t*20)*3); ctx.lineTo(cx+7,by-2); ctx.fill();
    ctx.globalAlpha=1; }
  if(grown){ // dönen altın ışınlar + yükselen korlar

    for(let k=0;k<4;k++){ const a=(state.t*50+k*14)%40, yy=p.y+p.h-a; ctx.globalAlpha=Math.max(0,1-a/40); ctx.fillStyle="#ffae3a"; ctx.fillRect(cx-12+k*8,yy,3,3); }
    ctx.globalAlpha=1; }
  if(speedB){ // arkada sarı hız izleri
    ctx.globalAlpha=0.5; ctx.fillStyle="#ffe14d"; for(let k=0;k<4;k++){ const off=(k+1)*7*-fd; ctx.fillRect(cx+off-2,p.y+6+k*9,Math.abs(Math.sin(p.walk))*10+6,3); } ctx.globalAlpha=1; }
  if(shB){ // mavi koruyucu baloncuk
    ctx.globalAlpha=0.3+0.15*Math.sin(state.t*6); ctx.strokeStyle="#9ad0ff"; ctx.lineWidth=3; ctx.beginPath(); ctx.ellipse(cx,p.y+p.h/2,p.w*0.85,p.h*0.62,0,0,7); ctx.stroke();
    ctx.fillStyle="rgba(150,210,255,0.12)"; ctx.fill(); ctx.globalAlpha=1; }
  if(magB){ // dönen pembe mıknatıs halkaları
    ctx.save(); ctx.translate(cx,p.y+p.h/2); ctx.rotate(state.t*3); ctx.strokeStyle="#ff7db0"; ctx.lineWidth=2.5; ctx.globalAlpha=0.6;
    for(let r=0;r<2;r++){ ctx.beginPath(); ctx.ellipse(0,0,p.w*0.7+r*6,p.h*0.5+r*5,0,0.4,Math.PI-0.4); ctx.stroke(); ctx.beginPath(); ctx.ellipse(0,0,p.w*0.7+r*6,p.h*0.5+r*5,0,Math.PI+0.4,-0.4); ctx.stroke(); }
    ctx.restore(); ctx.globalAlpha=1; }
  if(djB){ // mor kanat parıltısı
    ctx.fillStyle="#c77dff"; ctx.globalAlpha=0.7; const fw=Math.abs(Math.sin(state.t*10))*6+4;
    ctx.beginPath(); ctx.moveTo(cx-p.w*0.3,p.y+p.h*0.4); ctx.lineTo(cx-p.w*0.3-14,p.y+p.h*0.4-fw); ctx.lineTo(cx-p.w*0.3-6,p.y+p.h*0.55); ctx.fill();
    ctx.beginPath(); ctx.moveTo(cx+p.w*0.3,p.y+p.h*0.4); ctx.lineTo(cx+p.w*0.3+14,p.y+p.h*0.4-fw); ctx.lineTo(cx+p.w*0.3+6,p.y+p.h*0.55); ctx.fill(); ctx.globalAlpha=1; }

  const wlk=Math.sin(p.walk), air=!p.onGround && phase!=="chase";

  const skin="#e8b886", hat=grown?"#b03a2a":(hij?"#1a7a8a":cos.hat), shirt=grown?"#d0552a":(hij?"#1a90a8":cos.shirt), pants=cos.pants;
  const headR=p.w*0.30, headCY=p.y+headR+3, shY=p.y+p.h*0.40, hipY=p.y+p.h*0.64;

  else { const sw=wlk*p.w*0.46; ctx.beginPath(); ctx.moveTo(cx-p.w*0.12,hipY); ctx.lineTo(cx-p.w*0.12+sw,by); ctx.moveTo(cx+p.w*0.12,hipY); ctx.lineTo(cx+p.w*0.12-sw,by); ctx.stroke(); }

  ctx.strokeStyle=skin; ctx.lineWidth=Math.max(7,p.w*0.26);
  if(air){ ctx.beginPath(); ctx.moveTo(cx-p.w*0.34,shY+2); ctx.lineTo(cx-p.w*0.42,shY-p.h*0.20); ctx.moveTo(cx+p.w*0.34,shY+2); ctx.lineTo(cx+p.w*0.42,shY-p.h*0.20); ctx.stroke();
    ctx.fillStyle=skin; ctx.beginPath(); ctx.arc(cx-p.w*0.38,shY-p.h*0.05,p.w*0.13,0,7); ctx.arc(cx+p.w*0.38,shY-p.h*0.05,p.w*0.13,0,7); ctx.fill(); }

  // KAFA
  ctx.fillStyle=skin; ctx.beginPath(); ctx.arc(cx,headCY,headR,0,7); ctx.fill();

  ctx.fillStyle=hat; ctx.beginPath(); ctx.arc(cx,headCY-headR*0.30,headR*1.08,Math.PI,0); ctx.fill();
  ctx.fillRect(cx-headR*1.08,headCY-headR*0.34,headR*2.16,headR*0.46);
  ctx.fillRect(cx+(fd>0?-headR*1.98:headR*0.66),headCY-headR*0.32,headR*1.32,headR*0.30); // siper ARKAYA
  ctx.fillStyle=shade(hat,-0.18); ctx.fillRect(cx+(fd>0?headR*0.50:-headR*0.86),headCY-headR*0.30,headR*0.36,headR*0.26); // ön ayar tokası

  const ee=fd>0?headR*0.22:-headR*0.22;

    ctx.moveTo(cx+headR*0.1+ex,headCY); ctx.lineTo(cx+headR*0.5+ex,headCY+4); ctx.moveTo(cx+headR*0.5+ex,headCY); ctx.lineTo(cx+headR*0.1+ex,headCY+4); ctx.stroke(); }
  else { ctx.fillStyle="#222"; ctx.beginPath(); ctx.arc(cx-headR*0.28+ee,headCY+2,headR*0.16,0,7); ctx.arc(cx+headR*0.28+ee,headCY+2,headR*0.16,0,7); ctx.fill(); }
  ctx.restore();
}

function star(x,y,r,n){ ctx.beginPath(); for(let i=0;i<n*2;i++){ const rr=i%2?r*0.45:r,a=Math.PI/n*i-Math.PI/2; ctx[i?"lineTo":"moveTo"](x+Math.cos(a)*rr,y+Math.sin(a)*rr); } ctx.closePath(); ctx.fill(); }
function roundRect(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
function shade(c,amt){ let r,g,b; c=c+"";
  if(c[0]==="#"){ const n=parseInt(c.slice(1),16); r=(n>>16)&255; g=(n>>8)&255; b=n&255; }
  else { const m=c.match(/\d+/g); if(!m)return c; r=+m[0]; g=+m[1]; b=+m[2]; }
  r=Math.max(0,Math.min(255,r+amt*255)); g=Math.max(0,Math.min(255,g+amt*255)); b=Math.max(0,Math.min(255,b+amt*255));
  return "rgb("+(r|0)+","+(g|0)+","+(b|0)+")"; }

let last=0;
function loop(t){ const dt=Math.min((t-last)/1000||0,0.033); last=t; update(dt); draw(); requestAnimationFrame(loop); }

// dokunmatik kontroller (mobil)
function bindTouch(id,on,off){ const el=document.getElementById(id); if(!el)return;
  const d=e=>{ e.preventDefault(); on(); }, u=e=>{ e.preventDefault(); off(); };
  el.addEventListener("pointerdown",d); el.addEventListener("pointerup",u); el.addEventListener("pointerleave",u); el.addEventListener("pointercancel",u); }
bindTouch("t-left",()=>keys.ArrowLeft=true,()=>keys.ArrowLeft=false);
